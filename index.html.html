<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>workout-tracker</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --sub: #6b7280;
      --line: #e5e7eb;
      --accent: #2563eb;
      --accent-dark: #1d4ed8;
      --danger: #dc2626;
      --danger-bg: #fef2f2;
      --shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      --radius: 16px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Hiragino Sans",
        "Yu Gothic", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .app {
      max-width: 480px;
      margin: 0 auto;
      padding: 16px 14px 32px;
    }

    .title {
      font-size: 24px;
      font-weight: 700;
      margin: 8px 0 4px;
    }

    .subtitle {
      font-size: 13px;
      color: var(--sub);
      margin-bottom: 16px;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
      margin-bottom: 16px;
    }

    .section-title {
      font-size: 16px;
      font-weight: 700;
      margin: 0 0 14px;
    }

    .field {
      margin-bottom: 12px;
    }

    .field label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--text);
    }

    .input,
    .select,
    .textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 16px;
      background: #fff;
      color: var(--text);
      outline: none;
    }

    .input:focus,
    .select:focus,
    .textarea:focus {
      border-color: var(--accent);
    }

    .textarea {
      min-height: 88px;
      resize: vertical;
      line-height: 1.5;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .volume-box {
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 14px;
    }

    .volume-label {
      font-size: 12px;
      color: var(--sub);
      margin-bottom: 4px;
    }

    .volume-value {
      font-size: 22px;
      font-weight: 700;
      color: var(--accent-dark);
    }

    .btn {
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-primary:active {
      transform: scale(0.99);
    }

    .empty {
      text-align: center;
      color: var(--sub);
      font-size: 14px;
      padding: 18px 10px;
      border: 1px dashed var(--line);
      border-radius: 12px;
      background: #fafafa;
    }

    .record-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .record-item {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      background: #fff;
    }

    .record-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 10px;
    }

    .record-exercise {
      font-size: 17px;
      font-weight: 700;
      line-height: 1.4;
    }

    .record-date {
      font-size: 12px;
      color: var(--sub);
      white-space: nowrap;
    }

    .record-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-bottom: 10px;
    }

    .record-chip {
      background: #f9fafb;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
    }

    .chip-label {
      font-size: 11px;
      color: var(--sub);
      margin-bottom: 4px;
    }

    .chip-value {
      font-size: 15px;
      font-weight: 700;
    }

    .record-memo {
      font-size: 14px;
      line-height: 1.6;
      color: var(--text);
      white-space: pre-wrap;
      background: #f9fafb;
      border-radius: 10px;
      padding: 10px;
      border: 1px solid var(--line);
      margin-top: 4px;
    }

    .record-actions {
      margin-top: 10px;
      display: flex;
      justify-content: flex-end;
    }

    .delete-btn {
      border: 1px solid #fecaca;
      background: var(--danger-bg);
      color: var(--danger);
      font-size: 13px;
      font-weight: 700;
      padding: 8px 12px;
      border-radius: 10px;
      cursor: pointer;
    }

    .footer-note {
      text-align: center;
      font-size: 12px;
      color: var(--sub);
      margin-top: 8px;
    }

    @media (max-width: 380px) {
      .row,
      .record-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <h1 class="title">筋トレ記録</h1>
    <p class="subtitle">iPhoneで使いやすいシンプルな記録アプリ</p>

    <div class="card">
      <h2 class="section-title">記録を追加</h2>

      <div class="field">
        <label for="date">日付</label>
        <input id="date" class="input" type="date" readonly />
      </div>

      <div class="field">
        <label for="exercise">種目</label>
        <select id="exercise" class="select">
          <option value="ベンチプレス">ベンチプレス</option>
          <option value="インクラインベンチプレス">インクラインベンチプレス</option>
          <option value="ペックフライ">ペックフライ</option>
          <option value="ラットプルダウン">ラットプルダウン</option>
          <option value="シーテッドロー">シーテッドロー</option>
          <option value="サイドレイズ">サイドレイズ</option>
          <option value="ショルダープレス">ショルダープレス</option>
          <option value="レッグプレス">レッグプレス</option>
          <option value="レッグエクステンション">レッグエクステンション</option>
          <option value="レッグカール">レッグカール</option>
        </select>
      </div>

      <div class="row">
        <div class="field">
          <label for="sets">セット数</label>
          <input id="sets" class="input" type="number" inputmode="numeric" min="1" step="1" placeholder="例: 3" />
        </div>

        <div class="field">
          <label for="weight">重量(kg)</label>
          <input id="weight" class="input" type="number" inputmode="decimal" min="0" step="0.1" placeholder="例: 60" />
        </div>
      </div>

      <div class="field">
        <label for="reps">回数</label>
        <input id="reps" class="input" type="number" inputmode="numeric" min="1" step="1" placeholder="例: 10" />
      </div>

      <div class="volume-box">
        <div class="volume-label">ボリューム（重量 × 回数）</div>
        <div id="volumeDisplay" class="volume-value">0</div>
      </div>

      <div class="field">
        <label for="memo">メモ</label>
        <textarea id="memo" class="textarea" placeholder="フォームや感覚など自由に入力"></textarea>
      </div>

      <button id="saveBtn" class="btn btn-primary" type="button">保存する</button>
    </div>

    <div class="card">
      <h2 class="section-title">保存した記録</h2>
      <div id="recordList" class="record-list"></div>
      <div class="footer-note">記録はこのブラウザの localStorage に保存されます</div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "workout_records_v2";

    const dateEl = document.getElementById("date");
    const exerciseEl = document.getElementById("exercise");
    const setsEl = document.getElementById("sets");
    const weightEl = document.getElementById("weight");
    const repsEl = document.getElementById("reps");
    const memoEl = document.getElementById("memo");
    const volumeDisplayEl = document.getElementById("volumeDisplay");
    const saveBtn = document.getElementById("saveBtn");
    const recordListEl = document.getElementById("recordList");

    function getTodayString() {
      const now = new Date();
      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, "0");
      const day = String(now.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function calculateVolume() {
      const weight = parseFloat(weightEl.value) || 0;
      const reps = parseInt(repsEl.value, 10) || 0;
      return weight * reps;
    }

    function formatNumber(value) {
      if (Number.isInteger(value)) return String(value);
      return value.toFixed(1).replace(/\.0$/, "");
    }

    function updateVolumeDisplay() {
      volumeDisplayEl.textContent = formatNumber(calculateVolume());
    }

    function loadRecords() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        const parsed = raw ? JSON.parse(raw) : [];
        return Array.isArray(parsed) ? parsed : [];
      } catch (error) {
        console.error("localStorageの読み込みに失敗:", error);
        return [];
      }
    }

    function saveRecords(records) {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
      } catch (error) {
        console.error("localStorageへの保存に失敗:", error);
        alert("保存に失敗しました。ブラウザの保存容量を確認してください。");
      }
    }

    function clearForm() {
      exerciseEl.selectedIndex = 0;
      setsEl.value = "";
      weightEl.value = "";
      repsEl.value = "";
      memoEl.value = "";
      dateEl.value = getTodayString();
      updateVolumeDisplay();
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function createRecordItem(record, index) {
      const item = document.createElement("div");
      item.className = "record-item";

      const memoHtml = record.memo
        ? `<div class="record-memo">${escapeHtml(record.memo).replace(/\n/g, "<br>")}</div>`
        : "";

      item.innerHTML = `
        <div class="record-top">
          <div class="record-exercise">${escapeHtml(record.exercise)}</div>
          <div class="record-date">${escapeHtml(record.date)}</div>
        </div>

        <div class="record-grid">
          <div class="record-chip">
            <div class="chip-label">セット数</div>
            <div class="chip-value">${escapeHtml(String(record.sets))}</div>
          </div>
          <div class="record-chip">
            <div class="chip-label">重量(kg)</div>
            <div class="chip-value">${escapeHtml(String(record.weight))}</div>
          </div>
          <div class="record-chip">
            <div class="chip-label">回数</div>
            <div class="chip-value">${escapeHtml(String(record.reps))}</div>
          </div>
          <div class="record-chip">
            <div class="chip-label">ボリューム</div>
            <div class="chip-value">${escapeHtml(String(record.volume))}</div>
          </div>
        </div>

        ${memoHtml}

        <div class="record-actions">
          <button class="delete-btn" data-index="${index}" type="button">削除</button>
        </div>
      `;

      return item;
    }

    function renderRecords() {
      const records = loadRecords();

      if (records.length === 0) {
        recordListEl.innerHTML = `<div class="empty">まだ記録がありません</div>`;
        return;
      }

      recordListEl.innerHTML = "";
      records.forEach((record, index) => {
        recordListEl.appendChild(createRecordItem(record, index));
      });

      document.querySelectorAll(".delete-btn").forEach((button) => {
        button.addEventListener("click", () => {
          const recordIndex = Number(button.dataset.index);
          const currentRecords = loadRecords();

          if (!Number.isInteger(recordIndex)) return;
          if (!confirm("この記録を削除しますか？")) return;

          currentRecords.splice(recordIndex, 1);
          saveRecords(currentRecords);
          renderRecords();
        });
      });
    }

    function validateForm() {
      const sets = parseInt(setsEl.value, 10);
      const weight = parseFloat(weightEl.value);
      const reps = parseInt(repsEl.value, 10);

      if (!exerciseEl.value) {
        alert("種目を選択してください。");
        return false;
      }

      if (!Number.isInteger(sets) || sets <= 0) {
        alert("セット数を正しく入力してください。");
        return false;
      }

      if (Number.isNaN(weight) || weight < 0) {
        alert("重量を正しく入力してください。");
        return false;
      }

      if (!Number.isInteger(reps) || reps <= 0) {
        alert("回数を正しく入力してください。");
        return false;
      }

      return true;
    }

    function saveRecord() {
      if (!validateForm()) return;

      const records = loadRecords();
      const newRecord = {
        date: dateEl.value || getTodayString(),
        exercise: exerciseEl.value,
        sets: parseInt(setsEl.value, 10),
        weight: formatNumber(parseFloat(weightEl.value)),
        reps: parseInt(repsEl.value, 10),
        volume: formatNumber(calculateVolume()),
        memo: memoEl.value.trim()
      };

      records.unshift(newRecord);
      saveRecords(records);
      renderRecords();
      clearForm();
      alert("記録を保存しました。");
    }

    weightEl.addEventListener("input", updateVolumeDisplay);
    repsEl.addEventListener("input", updateVolumeDisplay);
    saveBtn.addEventListener("click", saveRecord);

    dateEl.value = getTodayString();
    updateVolumeDisplay();
    renderRecords();
  </script>
</body>
</html>
